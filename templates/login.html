<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/styles.css">
  <title>Login - CampusFit</title>
</head>
<body>
  <main class="login-page">
    
    <section class="login-hero">
      <div class="login-overlay"></div>

      <div class="login-card">
        <div class="login-logo">
          <img src="{{ url_for('static', filename='images/Logo1.1.png') }}" alt="CampusFit Logo">
        </div>

        <h1>Welcome Back!</h1>
        <p>Log in to continue your fitness journey.</p>

        <form action="/login" method="POST" class="login-form">
          <input type="email" name="email" placeholder="Email address" required>
          <input type="password" name="password" placeholder="Password" required>

          <button type="submit" class="btn btn-primary login-btn">Log In</button>
        </form>

        <div class="login-links">
          <a href="{{ url_for('index') }}">Back to Home</a>
          <span>|</span>
          <a href="{{ url_for('register') }}">Create Account</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
